<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ridecast UART Block Diagram</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f4f6f9;
    }
    svg {
      border: 1px solid #ccc;
      background-color: #fff;
      width: 100%;
      height: 400px;
    }
    .block {
      fill: #e6f2ff;
      stroke: #4a90e2;
      stroke-width: 2;
      rx: 8;
      ry: 8;
    }
    .block-text {
      font-size: 14px;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .arrow {
      stroke: #333;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }
  </style>
</head>
<body>
  <h2>UART Logger + CLI Architecture</h2>
  <svg>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
      </marker>
    </defs>

    <!-- Producer Tasks -->
    <rect class="block" x="50" y="50" width="120" height="50"/>
    <text class="block-text" x="110" y="75">Logger Task</text>

    <rect class="block" x="50" y="150" width="120" height="50"/>
    <text class="block-text" x="110" y="175">CLI Adapter Task</text>

    <!-- Queues -->
    <rect class="block" x="250" y="50" width="120" height="50"/>
    <text class="block-text" x="310" y="75">Logger Queue</text>

    <rect class="block" x="250" y="150" width="120" height="50"/>
    <text class="block-text" x="310" y="175">CLI Queue</text>

    <!-- UART TX -->
    <rect class="block" x="450" y="100" width="150" height="100"/>
    <text class="block-text" x="525" y="130">UART TX Task</text>
    <text class="block-text" x="525" y="150" font-size="12">High priority CLI check</text>
    <text class="block-text" x="525" y="170" font-size="12">Mutex protected send</text>

    <!-- Terminal -->
    <rect class="block" x="650" y="120" width="120" height="50"/>
    <text class="block-text" x="710" y="145">User Terminal</text>

    <!-- Arrows -->
    <line class="arrow" x1="170" y1="75" x2="250" y2="75"/>
    <line class="arrow" x1="170" y1="175" x2="250" y2="175"/>
    <line class="arrow" x1="370" y1="75" x2="450" y2="120"/>
    <line class="arrow" x1="370" y1="175" x2="450" y2="150"/>
    <line class="arrow" x1="600" y1="150" x2="650" y2="145"/>
  </svg>
</body>
</html>
